name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'install.sh'
      - 'install.ps1'
      - 'installer.iss'
      - 'printer-setup.sh'
      - 'printers.json'
      - 'embed_printers.py'
      - 'icon.png'
      - '.github/workflows/release.yml'

jobs:
  build-linux:
    name: Linux (AppImage)
    runs-on: node-34-custom
    permissions:
      contents: read
    outputs:
      version: ${{ steps.download.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Download OrcaSlicer AppImage
        id: download
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/OrcaSlicer/OrcaSlicer/releases/latest)
          LATEST=$(echo "$RELEASE" | python3 -c "
import json, sys
data = json.load(sys.stdin)
url = next((a['browser_download_url'] for a in data['assets']
            if 'AppImage_Ubuntu2404_V' in a['name'] and 'aarch64' not in a['name']), None)
if not url: raise SystemExit('No matching AppImage found')
print(url)
")
          VERSION=$(echo "$RELEASE" | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'])")
          echo "Downloading: $LATEST"
          wget -q --show-progress -O OrcaSlicer.AppImage "$LATEST"
          chmod +x OrcaSlicer.AppImage
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: sudo apt-get install -y squashfs-tools

      - name: Patch AppImage
        run: |
          ./OrcaSlicer.AppImage --appimage-extract 2>/dev/null

          cp icon.png squashfs-root/OrcaSlicer.png
          mkdir -p squashfs-root/usr/share/icons/hicolor/192x192/apps
          cp icon.png squashfs-root/usr/share/icons/hicolor/192x192/apps/OrcaSlicer.png
          cp icon.png squashfs-root/usr/share/icons/hicolor/192x192/apps/orca-slicer.png
          sed -i 's/Name=OrcaSlicer/Name=StemlabSlicer/g' squashfs-root/*.desktop
          sed -i 's/Name=OrcaSlicer/Name=StemlabSlicer/g' squashfs-root/usr/share/applications/*.desktop 2>/dev/null || true

          python3 embed_printers.py squashfs-root

          wget -q -O runtime "https://github.com/AppImage/AppImageKit/releases/download/continuous/runtime-x86_64"
          mksquashfs squashfs-root squashfs.img -noappend -comp xz -b 1M -root-owned -no-progress
          cat runtime squashfs.img > StemlabSlicer_Linux.AppImage
          printf '\x41\x49\x02' | dd of=StemlabSlicer_Linux.AppImage bs=1 seek=8 conv=notrunc 2>/dev/null
          chmod +x StemlabSlicer_Linux.AppImage
          rm -rf squashfs-root squashfs.img runtime OrcaSlicer.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: StemlabSlicer_Linux.AppImage
          retention-days: 1

  build-windows:
    name: Windows (Installer + Portable)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download OrcaSlicer Windows portable zip
        id: download
        shell: pwsh
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/OrcaSlicer/OrcaSlicer/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "Windows.*portable.*\.zip" } | Select-Object -First 1
          if (-not $asset) { throw "No matching Windows portable zip found" }
          Write-Host "Downloading: $($asset.browser_download_url)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile OrcaSlicer_portable.zip -UseBasicParsing
          echo "version=$($release.tag_name)" >> $env:GITHUB_OUTPUT

      - name: Extract, patch, and rename
        shell: pwsh
        run: |
          $buildDir = "C:\StemlabSlicer"
          Expand-Archive -Path OrcaSlicer_portable.zip -DestinationPath $buildDir

          $inner = Get-ChildItem $buildDir -Directory | Select-Object -First 1
          if ($inner) {
            Get-ChildItem $inner.FullName | Move-Item -Destination $buildDir
            Remove-Item $inner.FullName
          }

          if (-not (Test-Path "$buildDir\resources\profiles\Snapmaker.json")) {
            Write-Error "Unexpected structure - Snapmaker.json not found"
            Get-ChildItem $buildDir -Recurse -Name | Select-Object -First 30
            exit 1
          }

          python embed_printers.py $buildDir

          if (Test-Path "$buildDir\OrcaSlicer.exe") {
            Rename-Item "$buildDir\OrcaSlicer.exe" "StemlabSlicer.exe"
          }

      - name: Convert icon to ICO
        shell: pwsh
        run: magick convert icon.png -resize 256x256 icon.ico

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Build installer .exe
        shell: pwsh
        run: |
          $version = "${{ steps.download.outputs.version }}"
          iscc /DMyAppVersion="$version" /DMySourceDir="C:\StemlabSlicer" installer.iss

      - name: Build portable .zip
        shell: pwsh
        run: Compress-Archive -Path "C:\StemlabSlicer\*" -DestinationPath StemlabSlicer_Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: StemlabSlicer_Windows_Setup.exe
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: StemlabSlicer_Windows.zip
          retention-days: 1

  build-macos:
    name: macOS Universal (DMG)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download OrcaSlicer macOS Universal DMG
        run: |
          LATEST=$(curl -s https://api.github.com/repos/OrcaSlicer/OrcaSlicer/releases/latest \
            | python3 -c "
import json, sys
data = json.load(sys.stdin)
url = next((a['browser_download_url'] for a in data['assets']
            if 'Mac_universal_V' in a['name'] and a['name'].endswith('.dmg')), None)
if not url: raise SystemExit('No matching Mac universal DMG found')
print(url)
")
          echo "Downloading: $LATEST"
          curl -L --progress-bar -o OrcaSlicer.dmg "$LATEST"

      - name: Patch and repackage
        run: |
          hdiutil attach OrcaSlicer.dmg -quiet -nobrowse -readonly -mountpoint /tmp/orca_mount
          cp -r "/tmp/orca_mount/OrcaSlicer.app" ./StemlabSlicer.app
          hdiutil detach /tmp/orca_mount -quiet

          /usr/libexec/PlistBuddy -c "Set :CFBundleName StemlabSlicer" StemlabSlicer.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName StemlabSlicer" StemlabSlicer.app/Contents/Info.plist

          mkdir -p AppIcon.iconset
          for size in 16 32 64 128 256 512 1024; do
            sips -z $size $size icon.png --out AppIcon.iconset/icon_${size}.png 2>/dev/null
          done
          cp AppIcon.iconset/icon_16.png   AppIcon.iconset/icon_16x16.png
          cp AppIcon.iconset/icon_32.png   AppIcon.iconset/icon_16x16@2x.png
          cp AppIcon.iconset/icon_32.png   AppIcon.iconset/icon_32x32.png
          cp AppIcon.iconset/icon_64.png   AppIcon.iconset/icon_32x32@2x.png
          cp AppIcon.iconset/icon_128.png  AppIcon.iconset/icon_128x128.png
          cp AppIcon.iconset/icon_256.png  AppIcon.iconset/icon_128x128@2x.png
          cp AppIcon.iconset/icon_256.png  AppIcon.iconset/icon_256x256.png
          cp AppIcon.iconset/icon_512.png  AppIcon.iconset/icon_256x256@2x.png
          cp AppIcon.iconset/icon_512.png  AppIcon.iconset/icon_512x512.png
          cp AppIcon.iconset/icon_1024.png AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o AppIcon.icns
          find StemlabSlicer.app/Contents/Resources -name "*.icns" | while read f; do
            cp AppIcon.icns "$f"
          done

          python3 embed_printers.py StemlabSlicer.app/Contents/Resources profiles

          codesign --remove-signature StemlabSlicer.app || true
          codesign --force --deep --sign - StemlabSlicer.app

          hdiutil create -srcfolder StemlabSlicer.app \
            -volname "StemlabSlicer" -fs HFS+ -format UDZO \
            -o StemlabSlicer_Mac.dmg

          rm -rf StemlabSlicer.app AppIcon.iconset AppIcon.icns OrcaSlicer.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: StemlabSlicer_Mac.dmg
          retention-days: 1

  release:
    name: Publish Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Bundle printer configs
        run: |
          tar -czf dist/snapmaker-u1-configs.tar.gz \
            printer-setup.sh printers.json printers.csv install.sh install.ps1 README.md

      - name: Delete old latest release
        run: |
          gh release delete latest --repo ${{ github.repository }} --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "OrcaSlicer ${{ needs.build-linux.outputs.version }} + Snapmaker U1 (8 printers)"
          body: |
            ## Quick Start

            **Linux / macOS**
            ```bash
            curl -sL https://raw.githubusercontent.com/12MICKY/CUDSteamlabSlicer/main/install.sh | bash
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://raw.githubusercontent.com/12MICKY/CUDSteamlabSlicer/main/install.ps1 | iex
            ```

            ---
            | Printer | IP |
            |---|---|
            | U1-1 | 10.15.5.66 |
            | U1-2 | 10.15.5.160 |
            | U1-3 | 10.15.5.152 |
            | U1-4 | 10.15.5.69 |
            | U1-5 | 10.15.5.164 |
            | U1-6 | 10.15.5.174 |
            | U1-7 | 10.15.5.165 |
            | U1-8 | 10.15.5.70 |

            > VPN connection required (`10.15.5.0/24`)
            > macOS: right-click → Open on first launch (not notarized by Apple)
          files: |
            dist/linux-appimage/StemlabSlicer_Linux.AppImage
            dist/windows-installer/StemlabSlicer_Windows_Setup.exe
            dist/windows-zip/StemlabSlicer_Windows.zip
            dist/macos-dmg/StemlabSlicer_Mac.dmg
            dist/snapmaker-u1-configs.tar.gz
            install.sh
            install.ps1
          make_latest: true
